<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediMate | Your Health Companion</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0d9488', darkBg: '#0f172a', darkCard: '#1e293b' }
                }
            }
        }
    </script>

    <style>
        .taken { text-decoration: line-through; opacity: 0.5; }
        .mood-btn { width: 60px; height: 60px; font-size: 28px; border-radius: 15px; transition: all 0.2s; border: 2px solid #e2e8f0; }
        .mood-selected { border-color: #0d9488; background-color: #ccfbf1; transform: scale(1.1); }
        .dark .mood-btn { background-color: #334155; border-color: #475569; }
        .dark .mood-selected { border-color: #2dd4bf; background-color: #134e4a; }
    </style>
</head>

<body class="bg-slate-100 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

<div class="container mx-auto p-4 max-w-6xl">

    <header class="mb-6 flex flex-col md:flex-row justify-between items-center bg-white dark:bg-darkCard rounded-3xl shadow-lg p-8 border border-slate-200 dark:border-slate-800">
        <div>
            <h1 class="text-5xl font-black text-primary tracking-tighter">MediMate</h1>
            <p id="smartGreeting" class="text-2xl font-bold mt-1 text-slate-600 dark:text-slate-400"></p>
        </div>
        <div class="flex gap-3 mt-4 md:mt-0">
            <button id="themeToggle" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-2xl">🌙</button>
            <button id="enableNotifications" class="bg-primary text-white px-6 py-4 rounded-2xl font-black shadow-lg hover:bg-teal-700 transition">🔔 Alerts</button>
        </div>
    </header>

    <div class="grid lg:grid-cols-2 gap-8">
        
        <div class="space-y-8">
            <section class="bg-white dark:bg-darkCard rounded-3xl shadow-md p-8 border border-slate-200 dark:border-slate-800">
                <h2 class="text-2xl font-bold mb-6">💊 Add Medication</h2>
                <form id="medicationForm" class="space-y-4">
                    <input type="text" id="medName" placeholder="Medication Name" required class="w-full border-2 border-slate-100 dark:border-slate-700 dark:bg-slate-800 rounded-2xl p-4 text-lg outline-none focus:border-primary">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="dosage" placeholder="Dose (10mg)" required class="border-2 border-slate-100 dark:border-slate-700 dark:bg-slate-800 rounded-2xl p-4 text-lg">
                        <input type="time" id="time" required class="border-2 border-slate-100 dark:border-slate-700 dark:bg-slate-800 rounded-2xl p-4 text-lg">
                    </div>
                    
                    <div class="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border-2 border-dashed border-slate-200 dark:border-slate-700">
                        <label class="block text-sm font-bold text-slate-500 mb-2">📸 Pill Bottle Photo (Optional)</label>
                        <input type="file" id="medPhoto" accept="image/*" class="text-sm">
                    </div>

                    <button type="submit" class="w-full bg-primary text-white font-black py-5 rounded-2xl text-xl hover:bg-teal-700 transition">Save Medication</button>
                </form>
            </section>

            <section class="bg-white dark:bg-darkCard rounded-3xl shadow-md p-8 border border-slate-200 dark:border-slate-800">
                <h2 class="text-2xl font-bold mb-6">Mood Tracker</h2>
                <div class="flex justify-between mb-6">
                    <button class="mood-btn" data-value="1">😢</button>
                    <button class="mood-btn" data-value="2">😕</button>
                    <button class="mood-btn" data-value="3">😐</button>
                    <button class="mood-btn" data-value="4">🙂</button>
                    <button class="mood-btn" data-value="5">😁</button>
                </div>
                <textarea id="moodNotes" rows="3" placeholder="Notes or symptoms..." class="w-full border-2 border-slate-100 dark:border-slate-700 dark:bg-slate-800 rounded-2xl p-4 text-lg outline-none"></textarea>
                <button id="saveMood" class="w-full mt-4 bg-slate-800 dark:bg-slate-700 text-white font-bold py-4 rounded-2xl">Save Daily Entry</button>
            </section>
        </div>

        <div class="space-y-8">
            <section class="bg-white dark:bg-darkCard rounded-3xl shadow-md p-8 border border-slate-200 dark:border-slate-800">
                <h2 class="text-2xl font-bold mb-6">Today's Schedule</h2>
                <div id="scheduleList" class="space-y-4"></div>
            </section>

            <section class="bg-primary rounded-3xl shadow-xl p-8 text-white">
                <h2 class="text-3xl font-black mb-2">Medical Report</h2>
                <p class="opacity-90 mb-6 font-medium text-lg">Generate a professional summary for your doctor.</p>
                <button id="generatePdf" class="w-full bg-white text-primary font-black py-5 rounded-2xl text-xl shadow-lg hover:scale-[1.02] transition">📄 Download PDF</button>
            </section>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
